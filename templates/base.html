<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        :root { --hero-from: #0f172a; --hero-mid: #1e293b; --hero-to: #334155; }
        .dark { --hero-from: #020617; --hero-mid: #0f172a; --hero-to: #1e293b; }
        .gradient-hero { background: linear-gradient(135deg, var(--hero-from) 0%, var(--hero-mid) 50%, var(--hero-to) 100%); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .section { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-spin { animation: spin 0.7s linear infinite; }
        @media print {
            .gradient-hero { background: #1e293b !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            body { background: white !important; color: #1f2937 !important; }
            nav { display: none !important; }
            footer { display: none !important; }
            #page-loader { display: none !important; }
            .section, [class*="rounded-2xl"], [class*="rounded-xl"] { break-inside: avoid; page-break-inside: avoid; }
            svg circle, [class*="bg-emerald"], [class*="bg-blue"], [class*="bg-amber"],
            [class*="bg-red"], [class*="bg-purple"], [class*="bg-gray-8"], [class*="bg-gray-9"] {
                -webkit-print-color-adjust: exact; print-color-adjust: exact;
            }
            .hover\:shadow-md { box-shadow: none !important; }
            a { color: inherit !important; text-decoration: none !important; }
            /* Force light mode for print even if dark mode is active */
            .dark body, html.dark body { background: white !important; color: #1f2937 !important; }
        }
        {{extra_css}}
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 antialiased">

    <!-- Loading overlay -->
    <div id="page-loader" class="fixed inset-0 bg-gray-50 dark:bg-gray-900 z-[100] flex items-center justify-center transition-opacity duration-300">
        <div class="text-center">
            <div class="w-10 h-10 border-[3px] border-gray-200 border-t-blue-500 rounded-full loader-spin mx-auto mb-4"></div>
            <p class="text-sm text-gray-500">Loading report...</p>
        </div>
    </div>
    <script>
    window.addEventListener('load', function() {
        var loader = document.getElementById('page-loader');
        if (loader) { loader.style.opacity = '0'; setTimeout(function() { loader.remove(); }, 300); }
    });
    </script>

    <!-- Nav -->
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700 no-print">
        <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <a href="{{back_url}}" class="flex items-center justify-center w-7 h-7 rounded-lg text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="Back to Home">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                </a>
                <svg class="w-5 h-5 text-gray-700 dark:text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                <span class="font-semibold text-gray-800 dark:text-gray-100 text-sm">GitHub Review</span>
                <span class="text-gray-400 text-sm">/ @{{username}}</span>
                {{ai_indicator}}
            </div>
            <div class="flex items-center gap-1">
                <a href="{{nav_overview_url}}" class="px-3 py-1.5 rounded-lg text-sm font-medium {{nav_overview_class}}">Overview</a>
                <a href="{{nav_repos_url}}" class="px-3 py-1.5 rounded-lg text-sm font-medium {{nav_repos_class}}">Repositories <span class="text-xs text-gray-400">({{repo_count}})</span></a>
                <button onclick="window.print()" class="no-print ml-2 px-3 py-1.5 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 flex items-center gap-1.5" title="Save as PDF">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    PDF
                </button>
                <button id="theme-toggle" class="no-print p-2 rounded-lg text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors" title="Toggle dark mode">
                    <svg class="w-4 h-4 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <svg class="w-4 h-4 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>
            </div>
        </div>
    </nav>

    {{content}}

    <footer class="text-center py-8 text-sm text-gray-400 dark:text-gray-500">
        Generated by GitHub Profile Reviewer &middot; {{review_date}}
    </footer>

    <script>
    var tt = document.getElementById('theme-toggle');
    if (tt) tt.addEventListener('click', function() {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });
    </script>
</body>
</html>
