    <!-- Repos Header -->
    <div class="gradient-hero text-white py-10">
        <div class="max-w-7xl mx-auto px-6">
            <h1 class="text-2xl font-bold mb-1">Repository Reviews</h1>
            <p class="text-gray-300 text-sm">{{repo_count}} original repositories reviewed individually</p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex flex-col lg:flex-row gap-8">

            <!-- Sidebar -->
            <aside class="lg:w-72 shrink-0 no-print">
                <div class="lg:sticky lg:top-20 space-y-6">

                    <!-- Search -->
                    <div>
                        <input type="text" id="repo-search" placeholder="Search repos..."
                            class="w-full px-4 py-2.5 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        />
                    </div>

                    <!-- Filter by recommendation -->
                    <div>
                        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Recommendation</h3>
                        <div class="space-y-1">
                            <button data-filter="all" class="filter-btn active w-full text-left px-3 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-800">
                                All <span class="text-gray-400 float-right">{{repo_count}}</span>
                            </button>
                            <button data-filter="showcase" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">
                                &#9733; Showcase <span class="text-gray-400 float-right">{{count_showcase}}</span>
                            </button>
                            <button data-filter="improve" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">
                                &#8593; Improve <span class="text-gray-400 float-right">{{count_improve}}</span>
                            </button>
                            <button data-filter="keep" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">
                                &#10003; Keep <span class="text-gray-400 float-right">{{count_keep}}</span>
                            </button>
                            <button data-filter="archive" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">
                                &#8986; Archive <span class="text-gray-400 float-right">{{count_archive}}</span>
                            </button>
                        </div>
                    </div>

                    <!-- Filter by category -->
                    <div>
                        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Category</h3>
                        <div class="space-y-1" id="category-filters">
                            {{category_filter_buttons}}
                        </div>
                    </div>

                    <!-- Sort -->
                    <div>
                        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Sort By</h3>
                        <select id="sort-select" class="w-full px-3 py-2 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="recommendation">Recommendation</option>
                            <option value="score-desc">Score (High to Low)</option>
                            <option value="score-asc">Score (Low to High)</option>
                            <option value="name">Name (A-Z)</option>
                            <option value="activity">Last Activity</option>
                        </select>
                    </div>

                    <!-- Quick Nav -->
                    <div>
                        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Quick Nav</h3>
                        <div class="max-h-64 overflow-y-auto space-y-0.5 pr-1" id="quick-nav">
                            {{quick_nav_links}}
                        </div>
                    </div>

                </div>
            </aside>

            <!-- Repo Cards -->
            <main class="flex-1 min-w-0">
                <div class="mb-4 flex items-center justify-between">
                    <p class="text-sm text-gray-500 dark:text-gray-400" id="results-count">Showing {{repo_count}} repositories</p>
                </div>
                <div class="space-y-6" id="repo-grid">
                    {{repo_cards}}
                </div>
                <div id="no-results" class="hidden py-16 text-center">
                    <svg class="w-12 h-12 text-gray-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <p class="text-gray-400 text-sm">No repositories match your filters</p>
                </div>
            </main>

        </div>
    </div>

    <script>
    (function() {
        const cards = document.querySelectorAll('[data-repo]');
        const searchInput = document.getElementById('repo-search');
        const sortSelect = document.getElementById('sort-select');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const catBtns = document.querySelectorAll('.cat-filter-btn');
        const resultsCount = document.getElementById('results-count');
        const noResults = document.getElementById('no-results');
        const grid = document.getElementById('repo-grid');

        let activeFilter = 'all';
        let activeCategory = 'all';

        function applyFilters() {
            const query = searchInput.value.toLowerCase().trim();
            let visible = 0;

            cards.forEach(card => {
                const name = card.dataset.repo.toLowerCase();
                const rec = card.dataset.recommendation;
                const cat = card.dataset.category.toLowerCase();
                const desc = (card.dataset.description || '').toLowerCase();
                const langs = (card.dataset.languages || '').toLowerCase();

                const matchSearch = !query || name.includes(query) || desc.includes(query) || langs.includes(query);
                const matchFilter = activeFilter === 'all' || rec === activeFilter;
                const matchCategory = activeCategory === 'all' || cat === activeCategory;

                if (matchSearch && matchFilter && matchCategory) {
                    card.style.display = '';
                    visible++;
                } else {
                    card.style.display = 'none';
                }
            });

            resultsCount.textContent = `Showing ${visible} of ${cards.length} repositories`;
            noResults.classList.toggle('hidden', visible > 0);
        }

        function applySorting() {
            const sort = sortSelect.value;
            const arr = Array.from(cards);

            arr.sort((a, b) => {
                switch(sort) {
                    case 'score-desc': return (b.dataset.score|0) - (a.dataset.score|0);
                    case 'score-asc': return (a.dataset.score|0) - (b.dataset.score|0);
                    case 'name': return a.dataset.repo.localeCompare(b.dataset.repo);
                    case 'activity': return (b.dataset.activity || '').localeCompare(a.dataset.activity || '');
                    case 'recommendation': {
                        const order = { showcase: 0, improve: 1, keep: 2, archive: 3 };
                        const diff = (order[a.dataset.recommendation]||9) - (order[b.dataset.recommendation]||9);
                        return diff !== 0 ? diff : (b.dataset.score|0) - (a.dataset.score|0);
                    }
                    default: return 0;
                }
            });

            arr.forEach(card => grid.appendChild(card));
            applyFilters();
        }

        searchInput.addEventListener('input', applyFilters);
        sortSelect.addEventListener('change', applySorting);

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => { b.classList.remove('bg-gray-100', 'text-gray-800'); b.classList.add('text-gray-600'); });
                btn.classList.add('bg-gray-100', 'text-gray-800');
                btn.classList.remove('text-gray-600');
                activeFilter = btn.dataset.filter;
                applyFilters();
            });
        });

        catBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                catBtns.forEach(b => { b.classList.remove('bg-gray-100', 'text-gray-800'); b.classList.add('text-gray-600'); });
                btn.classList.add('bg-gray-100', 'text-gray-800');
                btn.classList.remove('text-gray-600');
                activeCategory = btn.dataset.category;
                applyFilters();
            });
        });
    })();
    </script>
